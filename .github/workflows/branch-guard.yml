# Branch Guard — informational only
#
# Previously this workflow failed squash/rebase merges because it required commit
# subjects to start with "Merge". GitHub branch protection (require PR, reviews,
# status checks) is the real enforcement; this job only leaves an audit trail.
name: Branch Guard

on:
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Main branch update notice
        run: |
          echo "::notice::Push to main recorded. Ensure repository settings require pull requests before merging and that required checks passed."
