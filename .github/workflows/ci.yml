name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit -p tsconfig.json
      - run: npm test
      - run: npm run build
        env:
          MC_EDITION: simple
          NEXT_PUBLIC_MC_EDITION: simple
      - run: npx playwright install chromium --with-deps
        if: matrix.os == 'ubuntu-latest'
      - run: npm run test:e2e
        if: matrix.os == 'ubuntu-latest'
        env:
          CI: true
          MC_EDITION: simple
          NEXT_PUBLIC_MC_EDITION: simple
          PLAYWRIGHT_OSS_ONLY: "1"

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
